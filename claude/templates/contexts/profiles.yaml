# profiles.yaml — composable plugin profiles for Claude Code.
#
# Registry is auto-discovered from installed_plugins.json.
# base → always-on plugins (never repeated in profiles)
# profiles → only list what they ENABLE beyond base

# Plugin marketplaces — registered + synced by `claude-context --sync`
# All use GitHub repos for portability. autoUpdate: true enables startup auto-update.
# For local dev, set CLAUDE_CONTEXT_LOCAL=1 and add local: paths.
#
# Three config layers (intentionally separate):
#   1. profiles.yaml — declarative source of truth (autoUpdate, GitHub repos)
#   2. settings.json extraKnownMarketplaces — Claude Code's native portable registration
#   3. known_marketplaces.json — runtime state (patched by claude-context --sync)
marketplaces:
  claude-plugins-official:
    github: anthropics/claude-plugins-official
    autoUpdate: true

  ai-safety-plugins:
    github: yulonglin/ai-safety-plugins
    autoUpdate: true

  dev-browser:
    github: sawyerhood/dev-browser
    autoUpdate: true

  ui-ux-pro-max-skill:
    github: nextlevelbuilder/ui-ux-pro-max-skill
    autoUpdate: true

  alignment-hive:
    github: Crazytieguy/alignment-hive
    autoUpdate: true

  productivity-tools:
    github: yulonglin/productivity-tools
    autoUpdate: true

# Always-on in every profile (declared once)
base:
  - superpowers
  - hookify
  - plugin-dev
  - commit-commands
  - claude-md-management
  - context7
  - core
  - llms-fetch-mcp

# Profiles — only list what they ENABLE beyond base
profiles:
  code:
    comment: "Software projects"
    enable:
      - code
      - workflow
      - code-simplifier
      - security-guidance

  research:
    comment: "Experiments, evals, analysis"
    enable:
      - research
      - writing
      - workflow
      - viz
      - ralph-loop
      # optional: remote-kernels (cloud GPU via RunPod, from alignment-hive)
      # install: claude plugin install remote-kernels@alignment-hive
      # https://github.com/Crazytieguy/alignment-hive

  writing:
    comment: "Papers, blog posts, documentation"
    enable:
      - writing
      - viz
      - workflow

  design:
    comment: "Frontend, visualizations, design systems"
    enable:
      - code
      - viz
      - figma
      - ui-ux-pro-max
      - frontend-design
      - playground

  full:
    comment: "Everything enabled (dotfiles, meta-work)"
    enable:
      - research
      - writing
      - code
      - workflow
      - viz
      - coderabbit
      - code-simplifier
      - security-guidance
      - dev-browser

  # Sub-profiles (compose with domain)
  python:
    comment: "Adds pyright-lsp"
    enable: [pyright-lsp]

  web:
    comment: "Web dev + browser automation"
    enable: [vercel, typescript-lsp, supabase, dev-browser]

  ml:
    comment: "Adds huggingface-skills"
    enable: [huggingface-skills]

  personal:
    comment: "Life and productivity — Things 3, Slack extensions"
    enable:
      - things-mcp
