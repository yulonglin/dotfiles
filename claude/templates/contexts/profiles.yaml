# profiles.yaml — composable plugin profiles for Claude Code.
#
# Registry is auto-discovered from installed_plugins.json.
# base → always-on plugins (never repeated in profiles)
# profiles → only list what they ENABLE beyond base

# Plugin marketplaces — registered + synced by `claude-tools context --sync`
# autoUpdate: true → claude-tools context --sync sets autoUpdate in known_marketplaces.json
marketplaces:
  # Anthropic
  claude-plugins-official:
    github: anthropics/claude-plugins-official
    autoUpdate: true

  # Own
  ai-safety-plugins:
    github: yulonglin/ai-safety-plugins
    autoUpdate: true
  productivity-tools:
    github: yulonglin/productivity-tools
    autoUpdate: true

  # Third-party
  alignment-hive:
    github: Crazytieguy/alignment-hive
    autoUpdate: true
  dev-browser-marketplace:
    github: sawyerhood/dev-browser
    autoUpdate: true
  codex-plugin-cc:
    github: crazytieguy/codex-plugin-cc
    autoUpdate: true
  ui-ux-pro-max-skill:
    github: nextlevelbuilder/ui-ux-pro-max-skill
    autoUpdate: true

# Always-on in every profile (declared once)
base:
  - claude-md-management
  - codex
  - commit-commands
  - context7
  - core
  - hookify
  - llms-fetch-mcp
  - plugin-dev
  - remember
  - superpowers
  - workflow

# macOS-only plugins — loaded only when claude-tools detects OS == macos at runtime
macos:
  - bear-mcp

# Domain profiles — primary workflow contexts.
# Note: domain-profile names (code, research, writing, viz) intentionally mirror their primary
# plugin — this is deliberate, not a mistake. The profile enables the plugin of the same name
# plus related companions.
profiles:
  code:
    comment: "Software projects"
    enable:
      - code
      - code-simplifier
      - security-guidance

  design:
    comment: "Frontend, visualizations, design systems"
    enable:
      - code
      - figma
      - frontend-design
      - playground
      - ui-ux-pro-max
      - viz

  research:
    comment: "Experiments, evals, analysis"
    enable:
      - ralph-loop
      - research
      - viz
      - writing
      # optional: remote-kernels (cloud GPU via RunPod, from alignment-hive)
      # install: claude plugin install remote-kernels@alignment-hive
      # https://github.com/Crazytieguy/alignment-hive

  writing:
    comment: "Papers, blog posts, documentation"
    enable:
      - viz
      - writing

  # Sub-profiles — compose with domain profiles above
  # Capability sub-profiles:
  messaging:
    comment: "Messaging and communication tools"
    enable: [telegram, imessage]

  ml:
    comment: "Adds huggingface-skills"
    enable: [huggingface-skills]

  productivity:
    comment: "Task and project management — Things 3, Bear/macOS (Notion via claude.ai connector)"
    enable: [things-mcp]

  automation:
    comment: "Browser automation (playwright, dev-browser)"
    enable: [dev-browser, playwright]

  # Language LSP sub-profiles:
  python:
    comment: "Adds pyright-lsp"
    enable: [pyright-lsp]

  typescript:
    comment: "Adds typescript-lsp"
    enable: [typescript-lsp]

  rust:
    comment: "Adds rust-analyzer-lsp"
    enable: [rust-analyzer-lsp]

  go:
    comment: "Adds gopls-lsp"
    enable: [gopls-lsp]

  swift:
    comment: "Adds swift-lsp"
    enable: [swift-lsp]
