# Clear Mac Apps Configuration
# One app name per line (exact match, case-insensitive)
# Lines starting with # are comments

# [no-touch] - Apps to leave completely alone (don't close windows or quit)
[no-touch]
Ghostty
cmux
Lettera
Super Productivity
Things
Things3

Focusmate (Safari)  # Focusmate runs in Safari
zoom.us

Obsidian

###

# [close-windows] - Apps where we close all windows but don't quit the app
[close-windows]
Claude
Granola
VoiceInk

Bear

MacMediaKeyForwarder
Spotify

Mouseless

Tailscale
NordVPN

Codex
Antinote

###

# [slow-quit] - Apps that ignore synthetic keystrokes but respond to quit commands
# Sends quit, then polls up to 30s for the process to exit before moving on
[slow-quit]
Spark Desktop

###

# [protected-windows] - Substrings matched against window/tab titles (case-insensitive)
# Chrome: checks ALL tab titles (reliable). Other apps: active window title only.
# If ANY window has a match, that app gets selective-close instead of quit
[protected-windows]
Google Meet
Focusmate (Safari)  # Focusmate runs in Safari

###

# [hide-idle] - Opt-in: hide (Cmd+H equivalent) after N minutes not frontmost.
# Orthogonal to [no-touch] (which only means "don't close/quit") - seeded from
# [no-touch] by default since those apps are already meant to be left running.
# "Focusmate (Safari)" is excluded: that's a Safari tab, not a real process name.
# Ghostty is excluded: it's the terminal Claude Code itself runs in - hiding it
# mid-session would yank focus away from whatever the user is doing.
[hide-idle]
cmux
Lettera
Super Productivity
Things
Things3
zoom.us
Obsidian
