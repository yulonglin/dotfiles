# Clear Mac Apps Configuration
# One app name per line (exact match, case-insensitive)
# Lines starting with # are comments

# [no-touch] - Apps to leave completely alone (don't close windows or quit)
[no-touch]
Ghostty
cmux
Codex

Antinote
Things

Focusmate (Safari)  # Focusmate runs in Safari
zoom.us

###

# [close-windows] - Apps where we close all windows but don't quit the app
[close-windows]
Claude
Granola
VoiceInk

BeardedSpice
Spotify

Mouseless

###

# [slow-close] - Apps that need time for cleanup (backup, sync) before windows close
# Gets two short close attempts, waits 60 seconds, then two more attempts before giving up
[slow-close]
Spark Desktop

###

# [protected-windows] - Substrings matched against window/tab titles (case-insensitive)
# Chrome: checks ALL tab titles (reliable). Other apps: active window title only.
# If ANY window has a match, that app gets selective-close instead of quit
[protected-windows]
Google Meet
