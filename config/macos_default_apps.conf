# config/macos_default_apps.conf
# ═══════════════════════════════════════════════════════════════════════════════
# Default Apps — File Type Associations
# ═══════════════════════════════════════════════════════════════════════════════
# Single source of truth for which app opens coding files.
# Used by:
#   - deploy.sh --file-apps  → sets macOS Launch Services defaults
#   - zshrc.sh               → exports $EDITOR and $VISUAL
#
# To change your default editor, update EDITOR_BUNDLE_ID and EDITOR_CLI below,
# then run: ./deploy.sh --file-apps
#
# Find an app's bundle ID:
#   osascript -e 'id of app "AppName"'
# ═══════════════════════════════════════════════════════════════════════════════

# ── Editor Presets ─────────────────────────────────────────────────────────────
# Uncomment ONE block. Comment out the others.
# ──────────────────────────────────────────────────────────────────────────────

# --- Cursor (default) ---
EDITOR_BUNDLE_ID="com.todesktop.230313mzl4w4u92"
EDITOR_CLI="cursor --wait"

# --- Zed ---
# EDITOR_BUNDLE_ID="dev.zed.Zed"
# EDITOR_CLI="zed --wait"

# --- Antigravity ---
# EDITOR_BUNDLE_ID="com.google.antigravity"
# EDITOR_CLI="/Applications/Antigravity.app/Contents/Resources/app/bin/antigravity --wait"

# --- VS Code ---
# EDITOR_BUNDLE_ID="com.microsoft.VSCode"
# EDITOR_CLI="code --wait"

# --- Neovim (via terminal) ---
# EDITOR_BUNDLE_ID=""  # no GUI bundle; terminal only
# EDITOR_CLI="nvim"

# Shell command for $EDITOR over SSH (lightweight/terminal editor)
EDITOR_CLI_SSH="edit"

# ── File Extensions ────────────────────────────────────────────────────────────
# Each extension is looked up as a UTI via UniformTypeIdentifiers at deploy time.
# Extensions with no recognized UTI are skipped (with a warning).
# ──────────────────────────────────────────────────────────────────────────────

EXTENSIONS=(
  # ── Languages ────────────────────────────────────────────────────────────────

  # Python
  py pyi pyw pyx pxd

  # JavaScript / TypeScript
  js jsx mjs cjs ts tsx mts cts

  # C / C++ / Objective-C
  c cc cpp cxx h hh hpp hxx m mm

  # Rust
  rs

  # Go
  go

  # Zig
  zig zon

  # Swift
  swift

  # Java / JVM
  java kt kts scala groovy gradle

  # C# / .NET
  cs csx vb fs fsi fsx

  # Ruby
  rb erb rake gemspec

  # PHP
  php phtml

  # Perl
  pl pm pod t

  # Lua
  lua

  # Shell / scripting
  sh bash zsh fish
  ps1 bat cmd

  # Functional
  hs lhs            # Haskell
  ml mli            # OCaml
  ex exs eex heex   # Elixir
  erl hrl           # Erlang
  clj cljs cljc edn # Clojure
  el elisp          # Emacs Lisp
  elm               # Elm
  nim               # Nim
  jl                # Julia
  rkt               # Racket

  # R / stats
  r rmd

  # ── Web ──────────────────────────────────────────────────────────────────────

  html htm xhtml
  css scss sass less styl
  vue svelte astro

  # ── Markup / docs ────────────────────────────────────────────────────────────

  md mdx txt rst adoc
  org                 # Org-mode
  tex bib sty cls     # LaTeX

  # ── Data / config ────────────────────────────────────────────────────────────

  json jsonl jsonc json5
  yaml yml toml
  xml xsl xsd dtd
  csv tsv
  ini cfg conf env
  properties
  plist               # macOS property list
  editorconfig

  # ── DevOps / infra ───────────────────────────────────────────────────────────

  tf tfvars hcl       # Terraform
  nix dhall
  vagrant

  # ── Database ─────────────────────────────────────────────────────────────────

  sql prisma

  # ── Serialization / schemas ──────────────────────────────────────────────────

  graphql gql
  proto               # Protocol Buffers
  avro
  thrift

  # ── Build / project ──────────────────────────────────────────────────────────

  cmake               # CMakeLists uses this extension in some contexts
  mk                  # Make includes

  # ── Other ────────────────────────────────────────────────────────────────────

  vim                 # Vimscript
  diff patch
  log
  lock                # Lockfiles (Cargo.lock, etc. — UTI may not exist, harmless skip)
)
